<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub - 配置文件与网盘资源分享</title>
    <meta name="description" content="FoodHub 的配置文件和网盘地址资源分享站">
    <meta name="keywords" content="FoodHub,配置文件,网盘资源,分享,FoodHub">
    <meta name="author" content="FoodHub">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📁</text></svg>">
    <style>
        :root {
            --md-sys-color-primary: #0066ff;
            --md-sys-color-on-primary: #ffffff;
            --md-sys-color-primary-container: #dceeff;
            --md-sys-color-on-primary-container: #001b3d;
            --md-sys-color-secondary: #546e7a;
            --md-sys-color-on-secondary: #ffffff;
            --md-sys-color-secondary-container: #cfd8dc;
            --md-sys-color-on-secondary-container: #0a1c24;
            --md-sys-color-surface: #f6faff;
            --md-sys-color-on-surface: #1a1c1e;
            --md-sys-color-surface-variant: #e0e3eb;
            --md-sys-color-on-surface-variant: #42474e;
            --md-sys-color-outline: #70757c;
            --md-sys-color-outline-variant: #c0c4cc;
            --md-sys-color-background: #f6faff;
            --md-sys-color-on-background: #1a1c1e;
            --md-elevation-1: 0 1px 2px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.05);
            --md-elevation-2: 0 1px 2px rgba(0,0,0,0.15), 0 2px 6px rgba(0,0,0,0.05);
            --md-shape-corner-full: 9999px;
            --transition: 0.2s cubic-bezier(0.2,0,0,1);
            --expand-speed: 0.5s cubic-bezier(0.2,0.8,0.4,1);
        }

        [data-theme="dark"] {
            --md-sys-color-primary: #80bfff;
            --md-sys-color-on-primary: #003166;
            --md-sys-color-primary-container: #004899;
            --md-sys-color-on-primary-container: #dceeff;
            --md-sys-color-secondary: #b0bec5;
            --md-sys-color-on-secondary: #1c3138;
            --md-sys-color-secondary-container: #37474f;
            --md-sys-color-on-secondary-container: #cfd8dc;
            --md-sys-color-surface: #1a1c1e;
            --md-sys-color-on-surface: #e2e2e6;
            --md-sys-color-surface-variant: #42474e;
            --md-sys-color-on-surface-variant: #c0c4cc;
            --md-sys-color-outline: #8a8f94;
            --md-sys-color-outline-variant: #42474e;
            --md-sys-color-background: #1a1c1e;
            --md-sys-color-on-background: #e2e2e6;
            --md-elevation-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px rgba(0,0,0,0.15);
            --md-elevation-2: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Google Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            line-height: 1.6; min-height: 100vh; transition: background 0.3s, color 0.3s;
        }
        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }

        .top-settings-bar {
            display: flex; justify-content: flex-end; gap: 12px; padding: 12px 0; margin-bottom: 8px;
        }
        .top-settings-bar select {
            padding: 6px 12px; border-radius: 20px; border: 1px solid var(--md-sys-color-outline);
            background: var(--md-sys-color-surface); color: var(--md-sys-color-on-surface);
            font-size: 0.8rem; cursor: pointer;
        }

        .card {
            background: var(--md-sys-color-surface); border-radius: 24px;
            box-shadow: var(--md-elevation-1); border: 1px solid var(--md-sys-color-outline-variant);
            transition: box-shadow 0.2s;
        }
        .card:hover { box-shadow: var(--md-elevation-2); }

        .profile-section { margin: 28px 0 28px; }
        .profile-card { padding: 24px; display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--md-sys-color-primary-container); overflow: hidden; flex-shrink: 0; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .profile-info { flex:1; min-width:200px; }
        .profile-name { font-size:1.5rem; font-weight:500; }
        .profile-bio { font-size:0.9rem; color: var(--md-sys-color-on-surface-variant); margin: 8px 0 16px; }

        .profile-links { display: flex; flex-wrap: wrap; gap: 12px; }
        .profile-link {
            display: inline-flex; align-items: center; gap:6px; padding: 8px 16px;
            border-radius: var(--md-shape-corner-full); font-size:0.8rem; font-weight:500;
            background: var(--md-sys-color-secondary-container); color: var(--md-sys-color-on-secondary-container);
            text-decoration: none; white-space: nowrap; overflow: hidden;
            max-width: 110px; transition: max-width var(--expand-speed), background 0.2s, padding 0.2s;
        }
        .profile-link:hover {
            background: var(--md-sys-color-surface-variant); max-width: 400px; padding-right: 20px;
        }
        .link-url {
            display: inline-block; max-width:0; overflow: hidden; white-space: nowrap; opacity:0;
            margin-left:0; transition: max-width var(--expand-speed), opacity 0.2s ease 0.2s, margin-left var(--expand-speed);
            color: var(--md-sys-color-on-surface-variant); font-weight:400;
        }
        .profile-link:hover .link-url { max-width: 250px; opacity:1; margin-left:4px; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px,1fr)); gap:12px; margin-bottom:20px; }
        .stat-card { padding:16px; text-align:center; }
        .stat-value { font-size:1.5rem; font-weight:500; color: var(--md-sys-color-primary); }
        .stat-label { font-size:0.75rem; color: var(--md-sys-color-on-surface-variant); }

        .toolbar { display:flex; flex-wrap:wrap; gap:12px; align-items:center; padding:16px; margin-bottom:16px; }
        .search-wrapper { flex:1; min-width:200px; position:relative; display:flex; align-items:center; }
        .search-icon {
            position:absolute; left:14px; top:50%; transform:translateY(-50%);
            color:var(--md-sys-color-on-surface-variant); pointer-events:none;
            display:flex; align-items:center;
        }
        .search-input {
            width:100%; padding:10px 14px 10px 42px; border:1px solid var(--md-sys-color-outline);
            border-radius:var(--md-shape-corner-full); background:var(--md-sys-color-surface);
            color:var(--md-sys-color-on-surface); outline:none; font-size:0.9rem;
        }
        .search-input:focus { border-color:var(--md-sys-color-primary); }

        .btn {
            display:inline-flex; align-items:center; gap:6px; padding:10px 18px;
            border-radius:var(--md-shape-corner-full); font-size:0.8rem; font-weight:500;
            cursor:pointer; border:none; transition:0.2s; white-space:nowrap; text-decoration:none;
            background:transparent; color:var(--md-sys-color-on-surface-variant);
        }
        .btn-filled { background:var(--md-sys-color-primary); color:var(--md-sys-color-on-primary); }
        .btn-outlined { border:1px solid var(--md-sys-color-outline); }
        .btn:hover { background:var(--md-sys-color-surface-variant); }
        .btn-filled:hover { background:var(--md-sys-color-on-primary-container); }

        .view-toggle-group { display:flex; background:var(--md-sys-color-surface-variant); border-radius:var(--md-shape-corner-full); padding:3px; }
        .view-toggle-btn {
            padding:7px 14px; border-radius:var(--md-shape-corner-full); border:none;
            background:transparent; cursor:pointer; font-size:0.8rem; color:var(--md-sys-color-on-surface-variant);
            display:inline-flex; align-items:center; gap:4px;
        }
        .view-toggle-btn.active {
            background:var(--md-sys-color-surface); color:var(--md-sys-color-on-surface);
            box-shadow:var(--md-elevation-1);
        }

        .filter-tags-bar { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0 4px; align-items:center; }
        .filter-tag { padding:6px 14px; border-radius:var(--md-shape-corner-full); font-size:0.75rem; font-weight:500; cursor:pointer; border:1px solid var(--md-sys-color-outline-variant); background:var(--md-sys-color-surface); color:var(--md-sys-color-on-surface-variant); transition:0.2s; }
        .filter-tag.active { background:var(--md-sys-color-secondary-container); color:var(--md-sys-color-on-secondary-container); border-color:var(--md-sys-color-secondary); }

        .file-list-container { overflow: hidden; }
        .file-table { width:100%; border-collapse:collapse; }
        .file-table th { text-align:left; padding:14px 18px; font-size:0.75rem; color:var(--md-sys-color-on-surface-variant); border-bottom:1px solid var(--md-sys-color-outline-variant); }
        .file-table td { padding:13px 18px; border-bottom:1px solid var(--md-sys-color-outline-variant); font-size:0.9rem; transition: background 0.2s; }
        .file-table tbody tr:hover { background:var(--md-sys-color-surface-variant); }
        .file-cards-grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); gap:14px; padding:16px; }
        .file-card { background:var(--md-sys-color-surface); border-radius:16px; padding:18px; border:1px solid var(--md-sys-color-outline-variant); display:flex; flex-direction:column; gap:8px; box-shadow:var(--md-elevation-1); transition: box-shadow 0.2s; }
        .file-card:hover { box-shadow:var(--md-elevation-2); }

        .pagination { display:flex; justify-content:center; align-items:center; gap:12px; padding:16px; flex-wrap:wrap; }
        .page-btn { min-width:40px; padding:8px 12px; border-radius:20px; background:var(--md-sys-color-surface); border:1px solid var(--md-sys-color-outline); cursor:pointer; font-size:0.8rem; }
        .page-btn.active { background:var(--md-sys-color-primary); color:white; border-color:var(--md-sys-color-primary); }
        .page-size-select { padding:8px 12px; border-radius:20px; border:1px solid var(--md-sys-color-outline); background:var(--md-sys-color-surface); }

        .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:1000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:0.3s; backdrop-filter:blur(4px); }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal { background:var(--md-sys-color-surface); border-radius:24px; max-width:800px; width:100%; max-height:85vh; display:flex; flex-direction:column; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
        .toast-container { position:fixed; bottom:24px; right:24px; z-index:2000; }
        .toast { background:#1c1b1f; color:#fef7ff; padding:12px 20px; border-radius:20px; margin-top:8px; animation:toastIn 0.3s; }
        @keyframes toastIn { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }

        .footer { text-align:center; padding:28px; color:var(--md-sys-color-on-surface-variant); font-size:0.8rem; }
        .footer a { color:var(--md-sys-color-primary); }

        .icon { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media (max-width:768px) {
            .file-table th:nth-child(2), .file-table td:nth-child(2) { display:none; }
            .file-cards-grid { grid-template-columns:1fr; }
        }
    </style>
</head>

<script>
(function() {
    const CONFIG = { githubOwner:'FoodUI', githubRepo:'foodui.github.io', githubBranch:'main', dataPath:'data/', cacheTTL:3600000, maxPreviewSize:500*1024, newFileThreshold:7*24*3600*1000, useCDN:true };

    function inferRepo() {
        if (window.location.hostname === 'foodui.github.io') {
            CONFIG.githubOwner = 'FoodUI';
            CONFIG.githubRepo = 'foodui.github.io';
        } else {
            const m = window.location.pathname.match(/^\/([^/]+)(?:\/([^/]+))?/);
            if (m && m[2]) CONFIG.githubRepo = m[2];
            else if (m && m[1]) CONFIG.githubRepo = m[1];
            else CONFIG.githubRepo = 'foodhub-data';
        }
    }

    const langMap = {
        zh: {
            bio: '配置文件与网盘地址资源分享站', searchPlaceholder:'搜索文件名或描述...', refresh:'刷新', totalFiles:'文件总数', totalSize:'总大小', newFiles:'近期新增', featured:'精选文件',
            empty:'没有找到文件', preview:'预览', download:'下载', copy:'复制', link:'链接', footer:'由 FoodUI 维护 · 托管于 GitHub Pages', filterLabel:'筛选：', clear:'清除',
            pagePrev:'上一页', pageNext:'下一页', pageSize:'每页', biliUrl:'space.bilibili.com', githubUrl:'https://github.com/FoodUI', emailUrl:'294825493@qq.com',
            sortNameAsc:'按名称 ↑', sortNameDesc:'按名称 ↓', sortSizeAsc:'按大小 ↑', sortSizeDesc:'按大小 ↓'
        },
        en: {
            bio: 'Configuration & Drive Resource Sharing', searchPlaceholder:'Search file name or description...', refresh:'Refresh', totalFiles:'Total Files', totalSize:'Total Size', newFiles:'New', featured:'Featured',
            empty:'No files found', preview:'Preview', download:'Download', copy:'Copy', link:'Link', footer:'Maintained by FoodUI · Hosted on GitHub Pages', filterLabel:'Filter: ', clear:'Clear',
            pagePrev:'Previous', pageNext:'Next', pageSize:'Per page', biliUrl:'space.bilibili.com', githubUrl:'https://github.com/FoodUI', emailUrl:'294825493@qq.com',
            sortNameAsc:'Name ↑', sortNameDesc:'Name ↓', sortSizeAsc:'Size ↑', sortSizeDesc:'Size ↓'
        }
    };
    let currentLang = 'zh';
    function detectLang() {
        const stored = localStorage.getItem('foodhub_lang');
        if(stored==='zh'||stored==='en') return stored;
        return navigator.language.startsWith('zh')?'zh':'en';
    }
    function t(key) { return (langMap[currentLang] && langMap[currentLang][key]) || key; }
    function applyLang() {
        document.documentElement.lang = currentLang==='zh'?'zh-CN':'en';
        document.querySelector('.profile-bio').textContent = t('bio');
        document.getElementById('searchInput').placeholder = t('searchPlaceholder');
        document.getElementById('refreshText').textContent = t('refresh');
        document.getElementById('stat-label-total').textContent = t('totalFiles');
        document.getElementById('stat-label-size').textContent = t('totalSize');
        document.getElementById('stat-label-new').textContent = t('newFiles');
        document.getElementById('stat-label-featured').textContent = t('featured');
        document.getElementById('emptyText').textContent = t('empty');
        document.getElementById('footerText').innerHTML = t('footer').replace('FoodUI','<a href="https://github.com/FoodUI">FoodUI</a>').replace('GitHub Pages','<a href="#">GitHub Pages</a>');
        const sortSelect = document.getElementById('sortSelect');
        if(sortSelect) {
            sortSelect.options[0].text = t('sortNameAsc');
            sortSelect.options[1].text = t('sortNameDesc');
            sortSelect.options[2].text = t('sortSizeAsc');
            sortSelect.options[3].text = t('sortSizeDesc');
        }
        document.querySelector('#biliLink .link-url').textContent = ': '+t('biliUrl');
        const githubSpan = document.querySelector('.profile-link:nth-child(2) .link-url');
        if(githubSpan) githubSpan.textContent = ': '+t('githubUrl');
        const emailSpan = document.querySelector('.profile-link:nth-child(3) .link-url');
        if(emailSpan) emailSpan.textContent = ': '+t('emailUrl');
        updateFilterLabel();
    }

    function updateFilterLabel() {
        const label = document.querySelector('.filter-tags-bar span:first-child');
        if(label) label.textContent = t('filterLabel');
    }

    // ========== 主题控制 ==========
    const systemDark = window.matchMedia('(prefers-color-scheme: dark)');

    function setTheme(mode) {
        if (mode === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        } else if (mode === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
        } else { // auto
            document.documentElement.setAttribute('data-theme', systemDark.matches ? 'dark' : 'light');
        }
        localStorage.setItem('foodhub_theme', mode);
    }

    function getStoredTheme() {
        return localStorage.getItem('foodhub_theme') || 'auto';
    }

    // 监听系统主题变化（仅自动模式生效）
    systemDark.addEventListener('change', () => {
        if (getStoredTheme() === 'auto') {
            document.documentElement.setAttribute('data-theme', systemDark.matches ? 'dark' : 'light');
        }
    });

    // 页面初始化时立刻应用主题
    const initialTheme = getStoredTheme();
    setTheme(initialTheme);

    // 绑定主题选择器
    document.getElementById('themeSelect').addEventListener('change', function() {
        setTheme(this.value);
    });
    // 同步选择器的默认值
    document.getElementById('themeSelect').value = initialTheme;

    const state = {
        allFiles:[], manifest:null, filteredFiles:[],
        currentView:'table', currentSort:'name-asc', searchQuery:'',
        activeTags:[], isLoading:true, previewFile:null,
        currentPage:1, itemsPerPage:10,
    };

    const dom = {
        searchInput: document.getElementById('searchInput'),
        sortSelect: document.getElementById('sortSelect'),
        fileListContent: document.getElementById('fileListContent'),
        skeletonLoader: document.getElementById('skeletonLoader'),
        emptyState: document.getElementById('emptyState'),
        refreshBtn: document.getElementById('refreshBtn'),
        viewToggleBtns: document.querySelectorAll('.view-toggle-btn'),
        filterTagsBar: document.getElementById('filterTagsBar'),
        previewModal: document.getElementById('previewModal'),
        previewCode: document.getElementById('previewCode'),
        paginationContainer: document.getElementById('paginationContainer'),
        statTotal: document.getElementById('stat-total'),
        statTotalSize: document.getElementById('stat-total-size'),
        statNew: document.getElementById('stat-new'),
        statFeatured: document.getElementById('stat-featured'),
    };

    const formatBytes = b => b? (i=>parseFloat((b/Math.pow(1024,i)).toFixed(1))+' '+['B','KB','MB','GB'][i])(Math.floor(Math.log(b)/Math.log(1024))):'0 B';
    const getFileMeta = name => state.manifest?.files?.[name]||null;
    const getDisplayName = name => getFileMeta(name)?.name || name.replace(/\.json$/i,'').replace(/[-_]/g,' ');
    const getFileTags = name => {
        const meta=getFileMeta(name); if(meta?.tags) return meta.tags;
        const t=[]; const l=name.toLowerCase();
        if(l.includes('config')) t.push('配置'); if(l.includes('drive')||l.includes('pan')) t.push('网盘');
        return t.length?t:['其他'];
    };
    const getRawUrl = file => CONFIG.useCDN?`https://cdn.jsdelivr.net/gh/${CONFIG.githubOwner}/${CONFIG.githubRepo}@${CONFIG.githubBranch}/${file.path}`:(file.download_url||'');

    async function loadGitHubAvatar() {
        try {
            const res = await fetch('https://api.github.com/users/FoodUI');
            const data = await res.json();
            if (data.avatar_url) {
                const img = document.getElementById('avatarImg');
                img.src = data.avatar_url;
                img.style.display = 'block';
                document.getElementById('avatarPlaceholder').style.display = 'none';
            }
        } catch(e) { console.warn('GitHub头像加载失败'); }
    }

    function renderFilterTags() {
        const allTags=new Set(); state.allFiles.forEach(f=>getFileTags(f.name).forEach(t=>allTags.add(t)));
        const tags=Array.from(allTags).sort();
        let html='<span>'+t('filterLabel')+'</span>';
        tags.forEach(tag=>{ const active=state.activeTags.includes(tag); html+=`<span class="filter-tag${active?' active':''}" data-tag="${tag}">${tag}</span>`; });
        if(state.activeTags.length) html+=`<button class="filter-clear" id="clearTagsBtn">${t('clear')}</button>`;
        dom.filterTagsBar.innerHTML=html;
        document.querySelectorAll('.filter-tag').forEach(el=>el.addEventListener('click',function(){
            const tag=this.dataset.tag; state.activeTags=state.activeTags.includes(tag)?state.activeTags.filter(t=>t!==tag):[...state.activeTags,tag];
            state.currentPage=1; applyFilters(); renderFilterTags();
        }));
        const clear=document.getElementById('clearTagsBtn'); if(clear) clear.addEventListener('click',()=>{ state.activeTags=[]; state.currentPage=1; applyFilters(); renderFilterTags(); });
    }

    function applyFilters() {
        let files=[...state.allFiles];
        const q=state.searchQuery.toLowerCase().trim();
        if(q) files=files.filter(f=>getDisplayName(f.name).toLowerCase().includes(q)||(getFileMeta(f.name)?.description||'').toLowerCase().includes(q));
        if(state.activeTags.length) files=files.filter(f=>state.activeTags.every(tag=>getFileTags(f.name).includes(tag)));
        switch(state.currentSort){
            case'name-asc':files.sort((a,b)=>a.name.localeCompare(b.name));break;
            case'name-desc':files.sort((a,b)=>b.name.localeCompare(a.name));break;
            case'size-asc':files.sort((a,b)=>a.size-b.size);break;
            case'size-desc':files.sort((a,b)=>b.size-a.size);break;
        }
        state.filteredFiles=files;
        state.currentPage=Math.min(state.currentPage, Math.max(1,Math.ceil(files.length/state.itemsPerPage)));
        renderFileListPage();
        updateStats(files);
    }

    function renderFileListPage() {
        if(state.isLoading){ dom.skeletonLoader.style.display='block'; dom.fileListContent.innerHTML=''; dom.emptyState.style.display='none'; dom.paginationContainer.innerHTML=''; return; }
        dom.skeletonLoader.style.display='none';
        const files=state.filteredFiles;
        if(!files.length){ dom.fileListContent.innerHTML=''; dom.emptyState.style.display='block'; dom.paginationContainer.innerHTML=''; return; }
        dom.emptyState.style.display='none';
        const totalPages=Math.ceil(files.length/state.itemsPerPage);
        const start=(state.currentPage-1)*state.itemsPerPage;
        const pageFiles=files.slice(start, start+state.itemsPerPage);
        if(state.currentView==='table') renderTable(pageFiles); else renderCards(pageFiles);
        window._foodHubFiles={}; pageFiles.forEach(f=>window._foodHubFiles[f.name]=f);
        renderPagination(totalPages);
    }

    function renderTable(files){
        let h='<table class="file-table"><thead><tr><th>文件名</th><th>描述</th><th>大小</th><th>操作</th></tr></thead><tbody>';
        files.forEach(f=>{ const tags=getFileTags(f.name); h+=`<tr><td><div class="file-name-cell">📄 ${escapeHTML(getDisplayName(f.name))} ${tags.map(t=>`<span class="badge" style="color:var(--md-sys-color-primary);">${t}</span>`).join('')}</div></td><td>${escapeHTML(getFileMeta(f.name)?.description||'—')}</td><td>${formatBytes(f.size)}</td><td><button class="btn btn-filled" onclick="window._foodHubPreview('${f.name}')">${t('preview')}</button> <button class="btn btn-outlined" onclick="window._foodHubDownload('${f.name}')">${t('download')}</button></td></tr>`; });
        h+='</tbody></table>'; dom.fileListContent.innerHTML=h;
    }
    function renderCards(files){
        let h='<div class="file-cards-grid">';
        files.forEach(f=>{ const tags=getFileTags(f.name); h+=`<div class="file-card"><div><strong>${escapeHTML(getDisplayName(f.name))}</strong></div><div>${escapeHTML(getFileMeta(f.name)?.description||'')}</div><div>${tags.join(' ')}</div><div>${formatBytes(f.size)}</div><div><button class="btn btn-filled" onclick="window._foodHubPreview('${f.name}')">${t('preview')}</button> <button class="btn btn-outlined" onclick="window._foodHubDownload('${f.name}')">${t('download')}</button></div></div>`; });
        h+='</div>'; dom.fileListContent.innerHTML=h;
    }

    function renderPagination(totalPages){
        let html='';
        if(totalPages<=1){ dom.paginationContainer.innerHTML=''; return; }
        html+=`<button class="page-btn" id="prevPageBtn" ${state.currentPage===1?'disabled':''}>${t('pagePrev')}</button>`;
        for(let i=1;i<=totalPages;i++) html+=`<button class="page-btn${i===state.currentPage?' active':''}" data-page="${i}">${i}</button>`;
        html+=`<button class="page-btn" id="nextPageBtn" ${state.currentPage===totalPages?'disabled':''}>${t('pageNext')}</button>`;
        html+=`<select class="page-size-select" id="pageSizeSelect"><option value="10" ${state.itemsPerPage===10?'selected':''}>10</option><option value="20" ${state.itemsPerPage===20?'selected':''}>20</option><option value="30" ${state.itemsPerPage===30?'selected':''}>30</option><option value="50" ${state.itemsPerPage===50?'selected':''}>50</option></select>`;
        dom.paginationContainer.innerHTML=html;
        document.getElementById('prevPageBtn')?.addEventListener('click',()=>{ if(state.currentPage>1){ state.currentPage--; renderFileListPage(); } });
        document.getElementById('nextPageBtn')?.addEventListener('click',()=>{ const total=Math.ceil(state.filteredFiles.length/state.itemsPerPage); if(state.currentPage<total){ state.currentPage++; renderFileListPage(); } });
        document.querySelectorAll('.page-btn[data-page]').forEach(b=>b.addEventListener('click',function(){ state.currentPage=parseInt(this.dataset.page); renderFileListPage(); }));
        document.getElementById('pageSizeSelect')?.addEventListener('change',function(){ state.itemsPerPage=parseInt(this.value); state.currentPage=1; applyFilters(); });
    }

    function updateStats(files){
        dom.statTotal.textContent=files.length;
        dom.statTotalSize.textContent=formatBytes(files.reduce((s,f)=>s+f.size,0));
        dom.statNew.textContent=files.filter(f=>{ const m=getFileMeta(f.name); return m?.addedDate&&Date.now()-new Date(m.addedDate).getTime()<CONFIG.newFileThreshold; }).length||0;
        dom.statFeatured.textContent=files.filter(f=>getFileMeta(f.name)?.featured).length;
    }
    function escapeHTML(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

    window._foodHubPreview=function(name){ const f=window._foodHubFiles[name]; if(f) openPreview(f); };
    window._foodHubDownload=function(name){ const f=window._foodHubFiles[name]; if(f) triggerDownload(f); };

    function openPreview(file){
        state.previewFile=file; dom.previewModal.classList.add('active'); dom.previewCode.textContent='Loading...';
        fetch(getRawUrl(file)).then(r=>r.text()).then(t=>{ try{ dom.previewCode.textContent=JSON.stringify(JSON.parse(t),null,2); }catch(e){ dom.previewCode.textContent=t; } });
    }
    function closePreview(){ dom.previewModal.classList.remove('active'); }
    function triggerDownload(file){ const a=document.createElement('a'); a.href=getRawUrl(file); a.download=file.name; a.click(); toast('Download started'); }
    function toast(msg){ const t=document.createElement('div'); t.className='toast'; t.textContent=msg; document.getElementById('toastContainer').appendChild(t); setTimeout(()=>t.remove(),2500); }

    async function fetchFiles(force=false){
        if(!force){ const c=JSON.parse(localStorage.getItem('foodhub_files')||'null'); if(c&&Date.now()-c.t<CONFIG.cacheTTL){ state.allFiles=c.v; state.isLoading=false; applyFilters(); renderFilterTags(); return; } }
        state.isLoading=true; renderFileListPage();
        try{
            const res=await fetch(`https://api.github.com/repos/${CONFIG.githubOwner}/${CONFIG.githubRepo}/contents/${CONFIG.dataPath}?ref=${CONFIG.githubBranch}`);
            if(!res.ok) throw new Error();
            const data=await res.json();
            const files=data.filter(i=>i.type==='file'&&i.name.endsWith('.json')).map(i=>({name:i.name,path:i.path,size:i.size,download_url:i.download_url}));
            state.allFiles=files; localStorage.setItem('foodhub_files',JSON.stringify({t:Date.now(),v:files}));
        }catch(e){ state.allFiles=JSON.parse(localStorage.getItem('foodhub_files')||'null')?.v||[]; }
        state.isLoading=false; state.currentPage=1; applyFilters(); renderFilterTags();
    }

    function bindEvents(){
        dom.searchInput.addEventListener('input',()=>{ state.searchQuery=dom.searchInput.value; state.currentPage=1; applyFilters(); });
        dom.sortSelect.addEventListener('change',()=>{ state.currentSort=dom.sortSelect.value; state.currentPage=1; applyFilters(); });
        dom.viewToggleBtns.forEach(b=>b.addEventListener('click',function(){
            dom.viewToggleBtns.forEach(x=>x.classList.remove('active')); this.classList.add('active'); state.currentView=this.dataset.view; renderFileListPage();
        }));
        dom.refreshBtn.addEventListener('click',async function(){
            const icon = document.getElementById('refreshIcon');
            icon.innerHTML = `<svg class="icon" viewBox="0 0 24 24" style="animation: spin 1s linear infinite;"><path d="M21 10.5a9 9 0 0 0-15.6-5.4"/><polyline points="21 4 21 10.5 14.5 10.5"/><path d="M3 13.5a9 9 0 0 0 15.6 5.4"/><polyline points="3 20 3 13.5 9.5 13.5"/></svg>`;
            this.disabled = true;
            await fetchFiles(true);
            icon.innerHTML = `<svg class="icon" viewBox="0 0 24 24"><path d="M21 10.5a9 9 0 0 0-15.6-5.4"/><polyline points="21 4 21 10.5 14.5 10.5"/><path d="M3 13.5a9 9 0 0 0 15.6 5.4"/><polyline points="3 20 3 13.5 9.5 13.5"/></svg>`;
            this.disabled = false;
            applyLang();
        });
        document.getElementById('closePreviewBtn').addEventListener('click',closePreview);
        dom.previewModal.addEventListener('click',e=>{ if(e.target===dom.previewModal) closePreview(); });
        // 语言选择器
        document.getElementById('langSelect').addEventListener('change',function(){
            const val=this.value; 
            if(val==='auto') currentLang=detectLang(); else currentLang=val;
            localStorage.setItem('foodhub_lang',val==='auto'?'auto':val);
            applyLang(); renderFilterTags(); renderFileListPage();
        });
    }

    async function init(){
        inferRepo();
        // 语言初始化
        const savedLang=localStorage.getItem('foodhub_lang')||'auto';
        document.getElementById('langSelect').value = savedLang;
        currentLang = savedLang==='auto'? detectLang() : savedLang;
        applyLang();
        bindEvents();
        await fetchFiles();
        loadGitHubAvatar();
    }
    init();
})();
</script>
</body>
</html>
