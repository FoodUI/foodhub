<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodHub · 资源分享站</title>
    <meta name="description" content="FoodHub 资源分享站 · 极致高透玻璃设计">
    <meta name="author" content="FoodUI">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📦</text></svg>">
    <style>
        :root {
            --primary: #0066ff;
            --on-primary: #ffffff;
            --primary-container: #dceeff;
            --on-primary-container: #001b3d;
            --secondary: #546e7a;
            --secondary-container: #cfd8dc;
            --on-secondary-container: #0a1c24;
            --surface: #f6faff;
            --on-surface: #ffffff;
            --surface-variant: rgba(224, 227, 235, 0.1);
            --on-surface-variant: #f0f0f0;
            --outline: #70757c;
            --outline-variant: rgba(255,255,255,0.15);
            --background: #f6faff;
            --on-background: #1a1c1e;
            /* 极致高透玻璃 */
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-shadow: 0 10px 30px rgba(0,0,0,0.05);
            --text-shadow: 0 1px 8px rgba(0,0,0,0.7);
            --radius-full: 9999px;
            --radius-lg: 28px;
            --transition: 0.25s cubic-bezier(0.2,0,0,1);
            --font: 'Google Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            --mono: 'JetBrains Mono', 'Fira Code', monospace;
            --blur-intensity: 5px;
        }

        [data-theme="dark"] {
            --primary: #80bfff;
            --on-primary: #003166;
            --primary-container: #004899;
            --on-primary-container: #dceeff;
            --secondary: #b0bec5;
            --secondary-container: #37474f;
            --on-secondary-container: #cfd8dc;
            --surface: #1a1c1e;
            --on-surface: #ffffff;
            --surface-variant: rgba(66, 71, 78, 0.1);
            --on-surface-variant: #e0e0e0;
            --outline: #8a8f94;
            --outline-variant: rgba(255,255,255,0.1);
            --background: #1a1c1e;
            --on-background: #e2e2e6;
            --glass-bg: rgba(20, 20, 25, 0.06);
            --glass-border: rgba(255,255,255,0.08);
            --glass-shadow: 0 10px 30px rgba(0,0,0,0.2);
            --text-shadow: 0 1px 8px rgba(0,0,0,0.8);
            --blur-intensity: 5px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font);
            background: var(--background);
            color: var(--on-background);
            line-height: 1.6;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            position: relative;
            overflow-x: hidden;
        }

        .video-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -2;
        }
        .gradient-bg {
            position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -3;
            background: radial-gradient(circle at 30% 40%, var(--primary-container) 0%, transparent 30%),
                        radial-gradient(circle at 70% 60%, var(--secondary-container) 0%, transparent 35%),
                        radial-gradient(circle at 50% 80%, var(--surface-variant) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite alternate;
        }
        @keyframes bgFloat {
            0% { transform: translate(0,0) rotate(0deg) scale(1); }
            33% { transform: translate(2%,-1%) rotate(1deg) scale(1.02); }
            66% { transform: translate(-1%,2%) rotate(-1deg) scale(0.98); }
            100% { transform: translate(1%,-2%) rotate(0.5deg) scale(1.01); }
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; position: relative; z-index: 1; }

        .navbar {
            display: flex; align-items: center; justify-content: space-between; gap: 16px;
            padding: 12px 20px; margin-top: 16px;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-intensity)); -webkit-backdrop-filter: blur(var(--blur-intensity));
            border-radius: var(--radius-lg); border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); flex-wrap: wrap;
        }
        .navbar-brand {
            display: flex; align-items: center; gap: 8px;
            font-size: 1.3rem; font-weight: 700; color: var(--on-surface);
            text-decoration: none; text-shadow: var(--text-shadow);
        }
        .navbar-links { display: flex; gap: 12px; flex-wrap: wrap; }
        .navbar-links a {
            font-size: 0.85rem; font-weight: 500; color: var(--on-surface-variant);
            text-decoration: none; padding: 6px 12px; border-radius: var(--radius-full);
            transition: background 0.2s; text-shadow: var(--text-shadow);
        }
        .navbar-links a:hover, .navbar-links a.active { background: var(--glass-bg); color: var(--primary); }
        .navbar-actions { display: flex; gap: 10px; align-items: center; }
        .top-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius-full); padding: 6px 14px; font-size: 0.8rem;
            cursor: pointer; color: var(--on-surface); backdrop-filter: blur(var(--blur-intensity));
            -webkit-backdrop-filter: blur(var(--blur-intensity)); transition: all var(--transition);
            text-shadow: var(--text-shadow); font-family: inherit;
        }
        .top-btn:hover { background: rgba(255,255,255,0.1); }

        .main-layout { display: flex; gap: 20px; margin-top: 20px; min-height: 70vh; }

        .sidebar {
            width: 260px; flex-shrink: 0;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-intensity)); -webkit-backdrop-filter: blur(var(--blur-intensity));
            border-radius: var(--radius-lg); border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); padding: 18px; position: sticky; top: 20px; align-self: flex-start;
            max-height: calc(100vh - 40px); overflow-y: auto;
        }
        .sidebar-title {
            font-size: 0.9rem; font-weight: 700; color: var(--on-surface);
            margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--glass-border);
            text-shadow: var(--text-shadow);
        }
        .menu-list { list-style: none; }
        .menu-item { margin-bottom: 2px; }
        .menu-link {
            display: block; padding: 8px 12px; font-size: 0.85rem; color: var(--on-surface-variant);
            text-decoration: none; border-radius: 8px; transition: background 0.2s; text-shadow: var(--text-shadow);
        }
        .menu-link:hover, .menu-link.active { background: var(--primary); color: white; text-shadow: none; }

        .content-area {
            flex: 1; min-width: 0;
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-intensity)); -webkit-backdrop-filter: blur(var(--blur-intensity));
            border-radius: var(--radius-lg); border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow); padding: 24px;
        }
        .content-title {
            font-size: 1.8rem; font-weight: 700; color: var(--on-surface);
            margin-bottom: 16px; text-shadow: var(--text-shadow);
        }

        .resource-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }
        .resource-card {
            background: var(--glass-bg); backdrop-filter: blur(var(--blur-intensity)); -webkit-backdrop-filter: blur(var(--blur-intensity));
            border-radius: 20px; border: 1px solid var(--glass-border);
            padding: 18px; display: flex; flex-direction: column; gap: 10px;
            transition: box-shadow 0.3s; box-shadow: var(--glass-shadow);
            color: var(--on-surface);
        }
        .resource-card:hover { box-shadow: 0 8px 25px rgba(0,0,0,0.15); }
        .resource-name {
            font-size: 1.1rem; font-weight: 700; color: var(--on-surface);
            display: flex; align-items: center; gap: 8px; text-shadow: var(--text-shadow);
        }
        .resource-desc {
            font-size: 0.85rem; color: var(--on-surface-variant); text-shadow: var(--text-shadow);
            line-height: 1.5; flex: 1;
        }
        .resource-meta {
            font-size: 0.75rem; color: var(--on-surface-variant); text-shadow: var(--text-shadow);
            display: flex; gap: 12px; flex-wrap: wrap;
        }
        .resource-actions { display: flex; gap: 8px; margin-top: auto; }
        .btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 10px 18px;
            border-radius: var(--radius-full); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; border: none; transition: all var(--transition); white-space: nowrap;
            background: var(--glass-bg); color: var(--on-surface);
            backdrop-filter: blur(var(--blur-intensity)); -webkit-backdrop-filter: blur(var(--blur-intensity));
            text-shadow: var(--text-shadow); border: 1px solid var(--glass-border);
        }
        .btn:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: var(--primary); color: var(--on-primary); text-shadow: none; }
        .btn-primary:hover { background: #0055dd; }

        /* 预览模态框 */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s; backdrop-filter: blur(8px);
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal {
            background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-radius: 28px; max-width: 800px; width: 100%; max-height: 85vh;
            display: flex; flex-direction: column; box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            border: 1px solid var(--glass-border);
        }
        .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--glass-border); }
        .modal-body { flex: 1; overflow: auto; padding: 0; }
        .modal-body pre {
            margin: 0; padding: 20px; background: rgba(0,0,0,0.2); color: var(--on-surface);
            font-family: var(--mono); font-size: 0.85rem; line-height: 1.7;
            white-space: pre-wrap; word-break: break-word; min-height: 300px;
            text-shadow: none;
        }
        .modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 20px; border-top: 1px solid var(--glass-border); }

        .footer {
            text-align: center; padding: 28px; color: var(--on-surface-variant);
            font-size: 0.8rem; text-shadow: var(--text-shadow); margin-top: 20px;
        }
        .footer a { color: var(--primary); }

        .mobile-menu-toggle {
            display: none; background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: var(--radius-full); padding: 8px 16px; font-size: 0.85rem;
            cursor: pointer; color: var(--on-surface); backdrop-filter: blur(var(--blur-intensity));
            margin-bottom: 12px; text-shadow: var(--text-shadow);
        }

        @media (max-width: 768px) {
            .main-layout { flex-direction: column; }
            .sidebar { width: 100%; position: static; max-height: none; display: none; }
            .sidebar.open { display: block; }
            .mobile-menu-toggle { display: inline-flex; align-items: center; gap: 6px; }
            .navbar-links { order: 3; width: 100%; justify-content: center; }
            .resource-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <video class="video-bg" id="bgVideo" autoplay muted loop playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="gradient-bg" id="bgGradient"></div>

    <div class="container">
        <nav class="navbar">
            <a href="https://foodui.github.io" class="navbar-brand">📦 FoodHub</a>
            <div class="navbar-links">
                <a href="https://foodui.github.io">首页</a>
                <a href="#" class="active">资源</a>
                <a href="#">手册</a>
                <a href="#">工具</a>
            </div>
            <div class="navbar-actions">
                <select id="themeSelect" class="top-btn">
                    <option value="auto">🌓 自动</option>
                    <option value="light">☀️ 浅色</option>
                    <option value="dark">🌙 深色</option>
                </select>
                <select id="langSelect" class="top-btn">
                    <option value="auto">🌐 自动</option>
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                </select>
            </div>
        </nav>

        <button class="mobile-menu-toggle" id="menuToggle">☰ 分类</button>

        <div class="main-layout">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-title" id="sidebarTitle">资源分类</div>
                <ul class="menu-list" id="menuList">
                    <li class="menu-item"><a href="#" class="menu-link active" data-category="config">⚙️ 配置文件</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" data-category="template">📄 模板文件</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" data-category="tool">🔧 实用工具</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" data-category="drive">☁️ 网盘资源</a></li>
                    <li class="menu-item"><a href="#" class="menu-link" data-category="other">📦 其他资源</a></li>
                </ul>
            </aside>

            <main class="content-area">
                <h1 class="content-title" id="categoryTitle">⚙️ 配置文件</h1>
                <div class="resource-grid" id="resourceGrid"></div>
            </main>
        </div>

        <footer class="footer">
            <p>© FoodHub · 由 <a href="https://deepseek.com" target="_blank">DeepSeek</a> 生成</p>
        </footer>
    </div>

    <!-- 预览模态框 -->
    <div class="modal-overlay" id="previewModal">
        <div class="modal">
            <div class="modal-header">
                <span id="previewTitle">📄 预览</span>
                <button class="btn" id="closePreviewBtn" style="padding:6px 12px;">✕</button>
            </div>
            <div class="modal-body">
                <pre><code id="previewCode"></code></pre>
            </div>
            <div class="modal-footer">
                <button class="btn" id="copyContentBtn">📋 复制</button>
                <button class="btn btn-primary" id="downloadFromPreviewBtn">⬇️ 下载</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // 主题控制
            function applyTheme(mode) {
                if (mode === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
                else if (mode === 'light') document.documentElement.setAttribute('data-theme', 'light');
                else {
                    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
                }
                localStorage.setItem('foodhub_theme', mode);
            }
            function detectTheme() { return localStorage.getItem('foodhub_theme') || 'auto'; }

            const systemDark = window.matchMedia('(prefers-color-scheme: dark)');
            systemDark.addEventListener('change', () => {
                if (localStorage.getItem('foodhub_theme') === 'auto') applyTheme('auto');
            });

            const themeSelect = document.getElementById('themeSelect');
            const savedTheme = detectTheme();
            applyTheme(savedTheme);
            themeSelect.value = savedTheme;
            themeSelect.addEventListener('change', (e) => applyTheme(e.target.value));

            // 资源数据（包含预览内容）
            const resourceData = {
                zh: {
                    categories: {
                        config: { title: '⚙️ 配置文件' },
                        template: { title: '📄 模板文件' },
                        tool: { title: '🔧 实用工具' },
                        drive: { title: '☁️ 网盘资源' },
                        other: { title: '📦 其他资源' }
                    },
                    items: [
                        { category: 'config', name: 'Nginx 配置模板', desc: '高性能 Web 服务器推荐配置', size: '2.1 KB', dl: '#', previewContent: 'server {\n    listen 80;\n    server_name example.com;\n    root /var/www/html;\n    index index.html;\n}' },
                        { category: 'config', name: 'VSCode 设置分享', desc: '优化后的编辑器配置文件', size: '4.5 KB', dl: '#', previewContent: '{\n    "editor.fontSize": 14,\n    "editor.tabSize": 2,\n    "editor.wordWrap": "on"\n}' },
                        { category: 'template', name: 'HTML5 博客模板', desc: '响应式、简洁的个人博客模板', size: '12.3 KB', dl: '#', previewContent: '<!DOCTYPE html>\n<html>\n<head><title>My Blog</title></head>\n<body>\n  <h1>Welcome</h1>\n</body>\n</html>' },
                        { category: 'template', name: '简历模板 (中文)', desc: '简约大方的中文简历 LaTeX 源码', size: '8.7 KB', dl: '#', previewContent: '\\documentclass{article}\n\\begin{document}\n\\section{个人信息}\n姓名：张三\n\\end{document}' },
                        { category: 'tool', name: '正则表达式速查表', desc: '常用正则表达式合集 (PDF)', size: '340 KB', dl: '#', previewContent: '正则表达式是一种强大的文本匹配工具...' },
                        { category: 'tool', name: 'Git 命令速查卡', desc: '常用 Git 命令快速参考', size: '180 KB', dl: '#', previewContent: 'git init\n git add .\n git commit -m "init"' },
                        { category: 'drive', name: '网盘资源合集', desc: '各类网盘资源链接整理', size: '1.2 MB', dl: '#', previewContent: '资源列表：\n1. 设计素材包\n2. 软件安装包\n3. 电子书合集' },
                        { category: 'other', name: '学习路线图', desc: '前端/后端学习路径思维导图', size: '450 KB', dl: '#', previewContent: '前端路线：HTML → CSS → JavaScript → React → Node.js' },
                        { category: 'other', name: 'API 文档合集', desc: 'RESTful API 设计规范与示例', size: '3.6 MB', dl: '#', previewContent: 'GET /api/users\nPOST /api/users\nContent-Type: application/json' }
                    ]
                },
                en: {
                    categories: {
                        config: { title: '⚙️ Config Files' },
                        template: { title: '📄 Templates' },
                        tool: { title: '🔧 Tools' },
                        drive: { title: '☁️ Drive Resources' },
                        other: { title: '📦 Others' }
                    },
                    items: [
                        { category: 'config', name: 'Nginx Config', desc: 'High-performance web server config', size: '2.1 KB', dl: '#', previewContent: 'server {\n    listen 80;\n    server_name example.com;\n    root /var/www/html;\n    index index.html;\n}' },
                        { category: 'config', name: 'VSCode Settings', desc: 'Optimized editor settings', size: '4.5 KB', dl: '#', previewContent: '{\n    "editor.fontSize": 14,\n    "editor.tabSize": 2,\n    "editor.wordWrap": "on"\n}' },
                        { category: 'template', name: 'HTML5 Blog Template', desc: 'Responsive and clean blog template', size: '12.3 KB', dl: '#', previewContent: '<!DOCTYPE html>\n<html>\n<head><title>My Blog</title></head>\n<body>\n  <h1>Welcome</h1>\n</body>\n</html>' },
                        { category: 'template', name: 'Resume Template', desc: 'Simple LaTeX resume template', size: '8.7 KB', dl: '#', previewContent: '\\documentclass{article}\n\\begin{document}\n\\section{Personal Info}\nName: John Doe\n\\end{document}' },
                        { category: 'tool', name: 'Regex Cheat Sheet', desc: 'Common regular expressions (PDF)', size: '340 KB', dl: '#', previewContent: 'Regular expressions are powerful...' },
                        { category: 'tool', name: 'Git Cheat Sheet', desc: 'Quick reference for Git commands', size: '180 KB', dl: '#', previewContent: 'git init\n git add .\n git commit -m "init"' },
                        { category: 'drive', name: 'Drive Collection', desc: 'Various drive resource links', size: '1.2 MB', dl: '#', previewContent: 'Resource list:\n1. Design assets\n2. Software packages\n3. eBooks' },
                        { category: 'other', name: 'Learning Roadmap', desc: 'Frontend/Backend learning paths', size: '450 KB', dl: '#', previewContent: 'Frontend: HTML → CSS → JavaScript → React → Node.js' },
                        { category: 'other', name: 'API Documentation', desc: 'RESTful API design guide', size: '3.6 MB', dl: '#', previewContent: 'GET /api/users\nPOST /api/users\nContent-Type: application/json' }
                    ]
                }
            };

            let currentLang = 'zh';
            const langSelect = document.getElementById('langSelect');
            const sidebarTitleEl = document.getElementById('sidebarTitle');
            const categoryTitleEl = document.getElementById('categoryTitle');
            const resourceGrid = document.getElementById('resourceGrid');
            const sidebar = document.getElementById('sidebar');

            const previewModal = document.getElementById('previewModal');
            const previewCode = document.getElementById('previewCode');
            const previewTitle = document.getElementById('previewTitle');
            let currentPreviewResource = null;

            function renderCategory(category) {
                const lang = currentLang;
                const data = resourceData[lang];
                const catInfo = data.categories[category] || data.categories.config;
                categoryTitleEl.textContent = catInfo.title;

                const items = data.items.filter(item => item.category === category);
                if (items.length === 0) {
                    resourceGrid.innerHTML = '<p style="color:var(--on-surface-variant);text-shadow:var(--text-shadow);">暂无资源</p>';
                    return;
                }
                let html = '';
                items.forEach((item, index) => {
                    html += `
                    <div class="resource-card">
                        <div class="resource-name">
                            <span>📁</span> ${item.name}
                        </div>
                        <div class="resource-desc">${item.desc}</div>
                        <div class="resource-meta">
                            <span>📦 ${item.size}</span>
                        </div>
                        <div class="resource-actions">
                            <button class="btn" onclick="window._previewResource('${category}', ${index})">👁️ 预览</button>
                            <a href="${item.dl}" class="btn btn-primary" target="_blank">⬇️ 下载</a>
                        </div>
                    </div>`;
                });
                resourceGrid.innerHTML = html;
            }

            window._previewResource = function(category, index) {
                const data = resourceData[currentLang];
                const item = data.items.filter(it => it.category === category)[index];
                if (!item) return;
                currentPreviewResource = item;
                previewTitle.textContent = `📄 ${item.name}`;
                previewCode.textContent = '加载中...';
                previewModal.classList.add('active');

                if (item.previewContent) {
                    previewCode.textContent = item.previewContent;
                } else if (item.dl && item.dl !== '#') {
                    fetch(item.dl)
                        .then(r => r.text())
                        .then(text => { previewCode.textContent = text; })
                        .catch(() => { previewCode.textContent = '无法加载预览内容'; });
                } else {
                    previewCode.textContent = '暂无预览内容';
                }
            };

            function closePreview() {
                previewModal.classList.remove('active');
                currentPreviewResource = null;
            }

            function highlightMenu(category) {
                document.querySelectorAll('.menu-link').forEach(link => link.classList.remove('active'));
                const activeLink = document.querySelector(`.menu-link[data-category="${category}"]`);
                if (activeLink) activeLink.classList.add('active');
            }

            const menuLinks = document.querySelectorAll('.menu-link');
            menuLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const category = this.dataset.category;
                    highlightMenu(category);
                    renderCategory(category);
                    if (window.innerWidth <= 768) sidebar.classList.remove('open');
                });
            });

            function setLangFromStorageOrBrowser() {
                const stored = localStorage.getItem('foodhub_lang');
                if (stored === 'zh' || stored === 'en') {
                    currentLang = stored;
                    langSelect.value = stored;
                } else {
                    currentLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
                    langSelect.value = 'auto';
                }
                applyLanguage();
            }

            function applyLanguage() {
                sidebarTitleEl.textContent = currentLang === 'zh' ? '资源分类' : 'Categories';
                const activeCategory = document.querySelector('.menu-link.active')?.dataset.category || 'config';
                renderCategory(activeCategory);
            }

            langSelect.addEventListener('change', (e) => {
                const val = e.target.value;
                if (val === 'auto') {
                    currentLang = navigator.language.startsWith('zh') ? 'zh' : 'en';
                } else {
                    currentLang = val;
                }
                localStorage.setItem('foodhub_lang', val);
                applyLanguage();
            });

            setLangFromStorageOrBrowser();

            const menuToggle = document.getElementById('menuToggle');
            menuToggle.addEventListener('click', () => sidebar.classList.toggle('open'));

            document.getElementById('closePreviewBtn').addEventListener('click', closePreview);
            previewModal.addEventListener('click', (e) => {
                if (e.target === previewModal) closePreview();
            });
            document.getElementById('copyContentBtn').addEventListener('click', () => {
                const text = previewCode.textContent;
                if (text && text !== '加载中...') navigator.clipboard.writeText(text).then(() => toast('内容已复制'));
            });
            document.getElementById('downloadFromPreviewBtn').addEventListener('click', () => {
                if (currentPreviewResource) {
                    const a = document.createElement('a');
                    a.href = currentPreviewResource.dl;
                    a.download = currentPreviewResource.name;
                    a.click();
                    toast('下载已开始');
                }
            });

            function toast(msg) {
                const t = document.createElement('div');
                t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:rgba(0,0,0,0.8);color:#fff;padding:12px 20px;border-radius:30px;z-index:2000;';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            }

            // 视频背景回退逻辑
            const video = document.getElementById('bgVideo');
            const gradient = document.getElementById('bgGradient');
            function showFallbackBackground() {
                video.style.display = 'none';
                gradient.style.display = 'block';
            }
            function showVideoBackground() {
                video.style.display = 'block';
                gradient.style.display = 'none';
            }
            video.addEventListener('loadeddata', showVideoBackground);
            video.addEventListener('error', showFallbackBackground);
            if (video.readyState >= 2) {
                if (video.videoWidth === 0 && video.videoHeight === 0) showFallbackBackground();
                else showVideoBackground();
            } else {
                setTimeout(() => {
                    if (video.readyState < 2) showFallbackBackground();
                }, 3000);
            }

            renderCategory('config');
        })();
    </script>
</body>
</html>
